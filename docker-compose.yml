services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dexter
      POSTGRES_PASSWORD: dexter
      POSTGRES_DB: dextertest
    ports:
      - "5432:5432"

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
